{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-danger shadow">
        <div class="card-body text-center p-5">
          <i class="bi bi-exclamation-triangle text-danger fs-1 mb-3"></i>
          <h2 class="fw-bold">¿Eliminar Pasajero?</h2>
          <p class="text-muted">
            Está a punto de eliminar a <strong>{{ pasajero.nombre }} {{ pasajero.apellido }}</strong>. 
            Esta acción no se puede deshacer.
          </p>
          
          <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-danger py-2 fw-bold">Confirmar Eliminación</button>
              <a href="{% url 'lista_pasajeros' %}" class="btn btn-light border py-2">No, mantener registro</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
